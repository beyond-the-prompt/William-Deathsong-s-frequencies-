<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DEATHSONG FREQUENCY</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body { margin:0; background:#000; color:#fff; font-family:Inter, sans-serif; overflow-x:hidden; }
.script { font-family:Cinzel, serif; }
.small-btn { background:#e5e5e5; color:#000; padding:10px; width:100%; margin-top:8px; }
.item { border:1px solid #333; padding:10px; margin-top:6px; cursor:pointer; }
.modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); padding:20px; overflow:auto; }
.modal.show { display:block; }
.center { max-width:520px; margin:auto; padding:20px; text-align:center; }
canvas { width:100%; height:70px; }
#particles { position:fixed; inset:0; opacity:0.15; pointer-events:none; }
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="center">

<h1 class="script text-3xl">DEATHSONG</h1>
<h2 class="script text-2xl text-red-500">FREQUENCY</h2>

<p style="opacity:0.6;">WILLIAM DEATHSONG • LAYERS</p>

<!-- FEATURED -->
<div style="margin-top:20px;">
<video id="featured" playsinline muted controls style="width:100%">
<source src="https://drive.google.com/uc?export=download&id=1r9Lt7xvuLlda5NDpqr6aRwj5ueEife1t">
</video>
</div>

<!-- LAYERS -->
<button class="small-btn" onclick="toggleLayers()">SELECT LAYER</button>

<div id="layers" style="display:none;">
<div class="item" onclick="openLayer('vulgar')">VULGAR GRACE</div>
<div class="item" onclick="openLayer('stormbound')">STORMBOUND</div>
<div class="item" onclick="openLayer('persistence')">PERSISTENCE</div>
<div class="item" onclick="openLayer('mindvirus')">MIND VIRUS DEFENDER</div>
</div>

<!-- AUDIO -->
<button class="small-btn" onclick="toggleAudio()" id="audioBtn">PLAY AUDIO</button>
<canvas id="viz"></canvas>

<!-- VAULT -->
<button class="small-btn" onclick="openVault()">OPEN VAULT</button>

<!-- SPIN -->
<button class="small-btn" onclick="spin()">SPIN 💀</button>
<p id="spinOut"></p>

<!-- SLOTS -->
<button class="small-btn" onclick="window.open('https://beyond-the-prompt.github.io/Deathsong-Frequency-sSlots/')">
E-SLOTS 🎰
</button>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
<button onclick="closeModal()">CLOSE</button>
<h2 id="title"></h2>
<div id="content"></div>
</div>

<audio id="audio"></audio>

<script>

const audio = document.getElementById("audio");
let playing = false;

/* FULL LIBRARY */
const lib = {
vulgar:{
mp3:[{t:"Vulgar Grace",s:"https://drive.google.com/uc?export=download&id=1t_57PmeUs2aFkZnTn69aIDZ6dByPe7E7"}],
mp4:[{t:"Vulgar Grace Video",s:"https://drive.google.com/uc?export=download&id=1r9Lt7xvuLlda5NDpqr6aRwj5ueEife1t"}]
},
stormbound:{
mp3:[{t:"Stormbound",s:"https://drive.google.com/uc?export=download&id=19RTUAwJnCSSFdsbEn7QQlB4gkn5Vgx79"}],
mp4:[{t:"Stormbound Video",s:"https://drive.google.com/uc?export=download&id=1QVNZRNaWcY1Cv_wK_YvU5KWLvKKrA9EY"}]
},
persistence:{
mp3:[{t:"Persistence",s:"https://drive.google.com/uc?export=download&id=134rQi7mvV0CRmD8AiiK_S_hbmrfHUaJK"}],
mp4:[{t:"Persistence Video",s:"https://drive.google.com/uc?export=download&id=1T4T1KYTNl9PrRvdGOz-tH_XTMVkVlplU"}]
},
mindvirus:{
mp3:[{t:"Mind Virus",s:"https://drive.google.com/uc?export=download&id=14k5Q21WNeYFWDKtfZosUZ_4LyRivYtBJ"}],
mp4:[{t:"Mind Virus Video",s:"https://drive.google.com/uc?export=download&id=1PQO05RTYTOhyBKdfvrVUwYGur3g4p8UK"}]
}
};

/* UI */

function toggleLayers(){
const el=document.getElementById("layers");
el.style.display = el.style.display==="block"?"none":"block";
}

function openLayer(k){
const l=lib[k];
document.getElementById("modal").classList.add("show");
document.getElementById("title").innerText=k.toUpperCase();

let html="<h3>MP3</h3>";
l.mp3.forEach(x=>{
html+=`<div class="item" onclick="playAudio('${x.s}')">${x.t}</div>`;
});

html+="<h3>MP4</h3>";
l.mp4.forEach(x=>{
html+=`<div class="item" onclick="playVideo('${x.s}')">${x.t}</div>`;
});

document.getElementById("content").innerHTML=html;
}

function openVault(){
let all=[];
Object.values(lib).forEach(l=>all.push(...l.mp4));

document.getElementById("modal").classList.add("show");
document.getElementById("title").innerText="VAULT";

document.getElementById("content").innerHTML =
all.map(v=>`<div class="item" onclick="playVideo('${v.s}')">${v.t}</div>`).join("");
}

function closeModal(){
document.getElementById("modal").classList.remove("show");
}

function playAudio(src){
audio.src=src;
audio.play();
playing=true;
document.getElementById("audioBtn").innerText="PAUSE AUDIO";
}

function playVideo(src){
const modal=document.getElementById("content");
modal.innerHTML=`<video controls autoplay style="width:100%"><source src="${src}"></video>`;
}

function toggleAudio(){
const first=lib.vulgar.mp3[0].s;

if(!playing){
audio.src=first;
audio.play();
playing=true;
document.getElementById("audioBtn").innerText="PAUSE AUDIO";
}else{
audio.pause();
playing=false;
document.getElementById("audioBtn").innerText="PLAY AUDIO";
}
}

function spin(){
const r=["VULGAR","STORMBOUND","PERSISTENCE","MIND VIRUS"];
document.getElementById("spinOut").innerText =
r[Math.floor(Math.random()*r.length)];
}

/* SIMPLE PARTICLES */
const p=document.getElementById("particles");
const c=p.getContext("2d");

function resize(){p.width=innerWidth;p.height=innerHeight;}
resize(); window.onresize=resize;

function draw(){
requestAnimationFrame(draw);
c.clearRect(0,0,p.width,p.height);
for(let i=0;i<50;i++){
c.fillStyle="rgba(180,30,30,0.4)";
c.fillRect((Date.now()/30+i*50)%p.width,(i*30)%p.height,2,2);
}
}
draw();

</script>

</body>
</html>
