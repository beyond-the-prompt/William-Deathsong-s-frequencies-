<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DEATHSONG FREQUENCY</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #000;
            color: #fff;
            margin: 0;
            overflow-x: hidden;
        }

        .script-font { font-family: 'Cinzel', serif; }

        .btn-gray {
            background: #d1d1d1;
            color: #000;
            padding: 12px;
            font-size: 13px;
            font-weight: 700;
            border-radius: 4px;
            text-transform: uppercase;
            border: none;
            width: 100%;
            cursor: pointer;
        }

        .btn-gray:active { background: #999; }

        .btn-red {
            background: #7f1d1d;
            color: #fff;
            padding: 12px;
            font-size: 13px;
            font-weight: 700;
            border-radius: 4px;
            text-transform: uppercase;
            border: none;
            width: 100%;
            cursor: pointer;
        }

        .item-card {
            background: #0a0a0a;
            border: 1px solid #222;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 4px;
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 1000;
            padding: 20px;
            overflow-y: auto;
        }

        .modal.active { display: block; }

        canvas { width: 100%; height: 70px; display: block; background: #080808; border-bottom: 1px solid #111; }
    </style>
</head>

<body>

<div class="max-w-md mx-auto px-4 py-12 text-center">

    <h1 class="script-font text-4xl mb-1">DEATHSONG</h1>
    <p class="script-font text-2xl text-red-700 mb-8 font-bold">FREQUENCY</p>

    <!-- MAIN MEDIA VIEW -->
    <div class="mb-6 bg-black rounded border border-zinc-800 overflow-hidden">
        <video id="mainVideo" class="w-full" controls poster="">
            <source src="https://drive.google.com/uc?export=download&id=1r9Lt7xvuLlda5NDpqr6aRwj5ueEife1t" type="video/mp4">
        </video>
    </div>

    <!-- AUDIO & VIZ -->
    <div class="mb-8">
        <canvas id="viz"></canvas>
        <div class="flex gap-2 mt-4">
            <button class="btn-gray" id="audioToggle" onclick="toggleAudio()">Play Audio</button>
            <button class="btn-gray" onclick="stopEverything()">Stop</button>
        </div>
        <p id="trackName" class="text-[11px] text-zinc-500 mt-3 uppercase tracking-tighter"></p>
    </div>

    <!-- NAVIGATION -->
    <div class="grid grid-cols-1 gap-4">
        <button class="btn-gray" onclick="openModal()">Files</button>
        <button class="btn-gray" onclick="playRandom()">Random</button>
        <button class="btn-red" onclick="window.open('https://beyond-the-prompt.github.io/Deathsong-Frequency-sSlots/')">
            E-Slots 🎰
        </button>
    </div>

    <p class="text-zinc-700 text-[10px] mt-16 uppercase">William Deathsong</p>
</div>

<!-- FILE DIRECTORY -->
<div id="fileModal" class="modal">
    <div class="max-w-md mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h2 class="script-font text-2xl text-red-700">FILES</h2>
            <button onclick="closeModal()" class="text-white text-4xl">&times;</button>
        </div>
        <div id="fileList"></div>
    </div>
</div>

<audio id="audioElement" crossorigin="anonymous"></audio>

<script>
const fileData = [
    { name: "vulgargrace", mp3: "1t_57PmeUs2aFkZnTn69aIDZ6dByPe7E7", mp4: "1r9Lt7xvuLlda5NDpqr6aRwj5ueEife1t" },
    { name: "stormbound", mp3: "19RTUAwJnCSSFdsbEn7QQlB4gkn5Vgx79", mp4: "1QVNZRNaWcY1Cv_wK_YvU5KWLvKKrA9EY" },
    { name: "persistence", mp3: "134rQi7mvV0CRmD8AiiK_S_hbmrfHUaJK", mp4: "1T4T1KYTNl9PrRvdGOz-tH_XTMVkVlplU" },
    { name: "transmindvirus", mp3: "14k5Q21WNeYFWDKtfZosUZ_4LyRivYtBJ", mp4: "1PQO05RTYTOhyBKdfvrVUwYGur3g4p8UK" },
    { name: "Autopsy_of_Vulgar_Grace", mp3: "PASTE_ID", mp4: "PASTE_ID" },
    { name: "Victor_Grace", mp3: "PASTE_ID", mp4: "PASTE_ID" },
    { name: "transvirus", mp3: "PASTE_ID", mp4: "PASTE_ID" },
    { name: "podcast1", mp3: "PASTE_ID", mp4: "PASTE_ID" },
    { name: "podcast2", mp3: "PASTE_ID", mp4: "PASTE_ID" },
    { name: "podcast3", mp3: "PASTE_ID", mp4: "PASTE_ID" },
    { name: "podcast4", mp3: "PASTE_ID", mp4: "PASTE_ID" },
    { name: "bornyoungage", mp3: "PASTE_ID", mp4: "PASTE_ID" },
    { name: "whoami", mp3: "PASTE_ID", mp4: "PASTE_ID" },
    { name: "Caboose in Rain", mp3: "PASTE_ID", mp4: "PASTE_ID" },
    { name: "Beta Transtestical Mindvirus", mp3: "PASTE_ID", mp4: "PASTE_ID" },
    { name: "Seattle Vice Fog (1)", mp3: "PASTE_ID", mp4: "PASTE_ID" }
];

const audio = document.getElementById("audioElement");
const video = document.getElementById("mainVideo");
let audioCtx, analyser, source, dataArray;
let isPlaying = false;

function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    source = audioCtx.createMediaElementSource(audio);
    source.connect(analyser);
    analyser.connect(audioCtx.destination);
    analyser.fftSize = 64;
    dataArray = new Uint8Array(analyser.frequencyBinCount);
    drawViz();
}

function toggleAudio() {
    initAudio();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    if (!isPlaying) {
        if (!audio.src) loadAudio(fileData[0].mp3, fileData[0].name);
        audio.play();
        document.getElementById("audioToggle").innerText = "Pause Audio";
        isPlaying = true;
    } else {
        audio.pause();
        document.getElementById("audioToggle").innerText = "Play Audio";
        isPlaying = false;
    }
}

function loadAudio(id, name) {
    initAudio();
    audio.src = `https://drive.google.com/uc?export=download&id=${id}`;
    audio.play();
    isPlaying = true;
    document.getElementById("audioToggle").innerText = "Pause Audio";
    document.getElementById("trackName").innerText = name;
    closeModal();
}

function loadVideo(id, name) {
    const list = document.getElementById("fileList");
    list.innerHTML = `
        <p class="text-red-700 font-bold mb-4 uppercase text-center">${name}</p>
        <video controls autoplay class="w-full bg-black border border-zinc-800">
            <source src="https://drive.google.com/uc?export=download&id=${id}" type="video/mp4">
        </video>
        <button class="btn-gray mt-6" onclick="openModal()">Return to Files</button>
    `;
}

function stopEverything() {
    audio.pause();
    video.pause();
    isPlaying = false;
    document.getElementById("audioToggle").innerText = "Play Audio";
}

function openModal() {
    const modal = document.getElementById("fileModal");
    const list = document.getElementById("fileList");
    modal.classList.add("active");
    list.innerHTML = "";

    fileData.forEach(item => {
        const div = document.createElement("div");
        div.className = "item-card";
        div.innerHTML = `
            <p class="text-xs font-bold mb-3 uppercase text-zinc-400">${item.name}</p>
            <div class="flex gap-2">
                <button class="btn-gray" onclick="loadAudio('${item.mp3}', '${item.name}')">Audio</button>
                <button class="btn-gray" onclick="loadVideo('${item.mp4}', '${item.name}')">Video</button>
            </div>
        `;
        list.appendChild(div);
    });
}

function closeModal() { document.getElementById("fileModal").classList.remove("active"); }

function playRandom() {
    const r = fileData[Math.floor(Math.random() * fileData.length)];
    loadAudio(r.mp3, r.name);
}

// VISUALIZER ENGINE
const canvas = document.getElementById("viz");
const ctx = canvas.getContext("2d");
function drawViz() {
    requestAnimationFrame(drawViz);
    if (!isPlaying) { ctx.clearRect(0,0,canvas.width, canvas.height); return; }
    analyser.getByteFrequencyData(dataArray);
    canvas.width = canvas.offsetWidth;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const spacing = canvas.width / dataArray.length;
    for (let i = 0; i < dataArray.length; i++) {
        const height = (dataArray[i] / 255) * canvas.height;
        ctx.fillStyle = "#991b1b";
        ctx.fillRect(i * spacing, canvas.height - height, spacing - 1, height);
    }
}
</script>

</body>
</html>
